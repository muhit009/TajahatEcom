services:

  # ── 1. Django REST API ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tajahat-backend
    expose:
      - "8000"
    ports:
      - "8000:8000"   # also exposed to host for direct API testing / Postman
    env_file: .env
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - static_images:/app/static/images
      - hf_cache:/root/.cache/huggingface   # cache sentence-transformers model
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ── 2. React + nginx ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tajahat-frontend
    ports:
      - "80:80"       # main entry point for the browser
    depends_on:
      - backend
    restart: unless-stopped

  # ── 3. Ollama (local LLM on RTX 3060 Ti) ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: tajahat-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh
    entrypoint: ["/bin/bash", "/ollama-entrypoint.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

volumes:
  ollama_data:      # Ollama model weights (~5GB for llama3.1:8b)
  static_images:    # uploaded product images
  hf_cache:         # sentence-transformers model cache (~80MB)
