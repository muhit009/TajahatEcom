services:
  web:
    build: .
    container_name: tajahat-web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - static_images:/app/static/images
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: tajahat-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh
    entrypoint: ["/bin/bash", "/ollama-entrypoint.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

volumes:
  ollama_data:
  static_images:
